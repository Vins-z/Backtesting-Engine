services:
  - type: web
    name: tradesim-backend
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    healthCheckTimeout: 10
    healthCheckInterval: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 8080
      - key: RENDER
        value: true
    autoDeploy: true
    branch: main
    numInstances: 1
    disk:
      name: backtesting-data
      mountPath: /app/data
      sizeGB: 5
